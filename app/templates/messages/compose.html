{% extends "base.html" %}

{% block title %}New Message - {{ app_name }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto space-y-4">
    <!-- Header -->
    <div class="flex items-center gap-3">
        <a href="/messages" class="p-1.5 -ml-1 rounded-lg hover:bg-neutral-100 transition-colors text-neutral-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h1 class="text-xl font-bold text-neutral-800">New Message</h1>
    </div>

    <!-- Compose Form -->
    <div class="bg-white rounded-xl shadow-sm border border-neutral-200 p-5">
        <form id="compose-form" class="space-y-4">
            <!-- Student Selector -->
            <div>
                <label for="student-select" class="block text-sm font-medium text-neutral-700 mb-1">About Student</label>
                <select id="student-select" name="student_id" required
                        class="w-full px-3 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-primary-500 focus:border-primary-500">
                    <option value="">Select a student...</option>
                    {% for item in compose_data %}
                    <option value="{{ item.student_id }}"
                            {{ 'selected' if preselected_student_id and item.student_id == preselected_student_id }}>
                        {{ item.student_name }}{% if item.class_name %} ({{ item.class_name }}){% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Recipient Selector -->
            <div>
                <label for="recipient-select" class="block text-sm font-medium text-neutral-700 mb-1">To</label>
                <select id="recipient-select" name="recipient_id" required
                        class="w-full px-3 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-primary-500 focus:border-primary-500"
                        disabled>
                    <option value="">Select a student first...</option>
                </select>
            </div>

            <!-- Subject -->
            <div>
                <label for="message-subject" class="block text-sm font-medium text-neutral-700 mb-1">Subject</label>
                <input id="message-subject" name="subject" type="text" required maxlength="255"
                       placeholder="e.g. Absence note, Homework question..."
                       class="w-full px-3 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-primary-500 focus:border-primary-500">
            </div>

            <!-- Message Body -->
            <div>
                <label for="message-body" class="block text-sm font-medium text-neutral-700 mb-1">Message</label>
                <textarea id="message-body" name="body" rows="4" required
                          placeholder="Write your message..."
                          class="w-full px-3 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-primary-500 focus:border-primary-500 resize-none"></textarea>
            </div>

            <!-- Submit -->
            <div class="flex justify-end gap-3">
                <a href="/messages" class="px-4 py-2 text-sm font-medium text-neutral-700 bg-white border border-neutral-300 rounded-lg hover:bg-neutral-50 transition-colors">
                    Cancel
                </a>
                <button type="submit" id="send-btn"
                        class="px-5 py-2 text-sm font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Send Message
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const recipientData = {{ compose_data_json | safe }};
    const studentSelect = document.getElementById('student-select');
    const recipientSelect = document.getElementById('recipient-select');
    const composeForm = document.getElementById('compose-form');
    const sendBtn = document.getElementById('send-btn');

    if (!studentSelect || !recipientSelect) return;

    // Build lookup: student_id -> recipients[]
    const recipientMap = {};
    for (const item of recipientData) {
        recipientMap[item.student_id] = item.recipients || [];
    }

    // Update recipients when student changes
    studentSelect.addEventListener('change', function() {
        const sid = studentSelect.value;
        recipientSelect.innerHTML = '';

        if (!sid) {
            recipientSelect.innerHTML = '<option value="">Select a student first...</option>';
            recipientSelect.disabled = true;
            return;
        }

        const recipients = recipientMap[sid] || [];
        if (recipients.length === 0) {
            recipientSelect.innerHTML = '<option value="">No recipients available</option>';
            recipientSelect.disabled = true;
            return;
        }

        recipientSelect.disabled = false;
        recipientSelect.innerHTML = '<option value="">Select recipient...</option>';
        for (const r of recipients) {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = r.name + ' (' + r.role.toLowerCase() + ')';
            recipientSelect.appendChild(opt);
        }

        // Auto-select if only one recipient
        if (recipients.length === 1) {
            recipientSelect.value = recipients[0].id;
        }
    });

    // Trigger change if pre-selected
    if (studentSelect.value) {
        studentSelect.dispatchEvent(new Event('change'));
    }

    // Handle form submission
    if (composeForm) {
        composeForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const studentId = studentSelect.value;
            const recipientId = recipientSelect.value;
            const subject = document.getElementById('message-subject').value.trim();
            const body = document.getElementById('message-body').value.trim();

            if (!studentId || !recipientId || !subject || !body) {
                ClassUp.toast('Please fill in all fields', 'warning');
                return;
            }

            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            try {
                const result = await ClassUp.fetch('/api/v1/messages', {
                    method: 'POST',
                    body: {
                        student_id: studentId,
                        recipient_id: recipientId,
                        subject: subject,
                        body: body,
                    }
                });

                if (result) {
                    ClassUp.toast('Message sent', 'success');
                    window.location.href = '/messages/thread/' + studentId + '/' + recipientId;
                }
            } catch (error) {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Message';
            }
        });
    }
})();
</script>
{% endblock %}
