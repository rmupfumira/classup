{% extends "base.html" %}

{% block title %}New Timetable - {{ app_name }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="mb-5">
        <a href="/timetable" class="text-sm text-neutral-500 hover:text-neutral-700">&larr; Back to Timetables</a>
        <h1 class="mt-2 text-xl font-semibold text-neutral-800">Create New Timetable</h1>
        <p class="mt-0.5 text-sm text-neutral-500">Start with an empty grid, then auto-generate or edit manually.</p>
    </div>

    <div class="bg-white rounded-lg shadow-card border border-neutral-200 p-6">
        <form id="create-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-neutral-700 mb-1">Class</label>
                <select id="class_id" required
                        class="block w-full h-9 px-3 text-sm border border-neutral-300 rounded bg-white focus:border-primary-500 focus:ring-0">
                    <option value="">Select a class...</option>
                    {% for cls in classes %}
                    <option value="{{ cls.id }}">{{ cls.name }}</option>
                    {% endfor %}
                </select>
                <p class="mt-1 text-xs text-neutral-500">Only classes with subjects assigned can be auto-generated.</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-neutral-700 mb-1">Timetable Name</label>
                <input type="text" id="name" required placeholder="e.g. Grade 7A - Term 1"
                       class="block w-full h-9 px-3 text-sm border border-neutral-300 rounded bg-white focus:border-primary-500 focus:ring-0">
            </div>
            <div class="flex justify-end gap-2 pt-2">
                <a href="/timetable" class="px-4 py-2 text-sm text-neutral-700 bg-neutral-100 rounded hover:bg-neutral-200">Cancel</a>
                <button type="submit" class="px-4 py-2 text-sm text-white bg-primary-500 rounded hover:bg-primary-600">Create</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const class_id = document.getElementById('class_id').value;
    const name = document.getElementById('name').value.trim();
    if (!class_id || !name) return;

    try {
        const res = await ClassUp.fetch('/api/v1/timetable/timetables', {
            method: 'POST',
            body: JSON.stringify({ class_id, name }),
        });
        ClassUp.toast('Timetable created', 'success');
        window.location.href = '/timetable/' + res.data.id;
    } catch (err) {
        ClassUp.toast(err.message || 'Failed to create timetable', 'error');
    }
});
</script>
{% endblock %}
